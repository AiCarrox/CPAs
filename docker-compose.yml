services:
  app:
    build:
      context: .
    container_name: cpas-app
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "4179"
    ports:
      - "127.0.0.1:4179:4179"
    volumes:
      - ./data:/app/.data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4179/api/session').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
