server {
    listen 80;
    server_name cpas.6553501.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name cpas.6553501.xyz;

    ssl_certificate /usr/local/nginx/conf/ssl/cpas.6553501.xyz/fullchain.pem;
    ssl_certificate_key /usr/local/nginx/conf/ssl/cpas.6553501.xyz/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/cpas_access.log;
    error_log /var/log/nginx/cpas_error.log warn;

    location / {
        proxy_pass http://127.0.0.1:4179;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }
}
